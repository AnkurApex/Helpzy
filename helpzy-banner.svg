<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14532d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#052e16;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#65a30d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="820" cy="40"  r="80" fill="#a3e635" opacity="0.04"/>
  <circle cx="80"  cy="160" r="100" fill="#a3e635" opacity="0.05"/>
  <circle cx="450" cy="100" r="200" fill="#16a34a" opacity="0.03"/>

  <!-- Vertical accent bar -->
  <rect x="56" y="44" width="5" height="112" fill="url(#accent)" rx="3"/>

  <!-- HELPZY wordmark -->
  <text x="78" y="110" font-family="Arial Black, Arial, sans-serif" font-size="68" font-weight="900"
        font-style="italic" letter-spacing="-2" fill="url(#accent)" filter="url(#glow)">HELPZY</text>

  <!-- Tagline -->
  <text x="79" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="400"
        letter-spacing="4" fill="#86efac" opacity="0.8">INDIA'S HOME SERVICE PLATFORM</text>

  <!-- Divider -->
  <line x1="490" y1="60" x2="490" y2="140" stroke="#a3e635" stroke-width="1" opacity="0.2"/>

  <!-- Service icons area (right side) -->
  <!-- Plumber icon -->
  <circle cx="555" cy="100" r="28" fill="#052e16" stroke="#a3e635" stroke-width="1.5" opacity="0.8"/>
  <text x="555" y="107" font-family="Arial" font-size="22" text-anchor="middle" fill="#a3e635">🔧</text>

  <!-- Electrician icon -->
  <circle cx="625" cy="100" r="28" fill="#052e16" stroke="#a3e635" stroke-width="1.5" opacity="0.8"/>
  <text x="625" y="107" font-family="Arial" font-size="22" text-anchor="middle" fill="#a3e635">⚡</text>

  <!-- Cleaner icon -->
  <circle cx="695" cy="100" r="28" fill="#052e16" stroke="#a3e635" stroke-width="1.5" opacity="0.8"/>
  <text x="695" y="107" font-family="Arial" font-size="22" text-anchor="middle" fill="#a3e635">🧹</text>

  <!-- AC icon -->
  <circle cx="765" cy="100" r="28" fill="#052e16" stroke="#a3e635" stroke-width="1.5" opacity="0.8"/>
  <text x="765" y="107" font-family="Arial" font-size="22" text-anchor="middle" fill="#a3e635">❄️</text>

  <!-- Bottom tagline -->
  <text x="450" y="182" font-family="Arial, sans-serif" font-size="11" text-anchor="middle"
        letter-spacing="3" fill="#4ade80" opacity="0.5">BOOK TRUSTED PROFESSIONALS · FAST · VERIFIED · RELIABLE</text>
</svg>
